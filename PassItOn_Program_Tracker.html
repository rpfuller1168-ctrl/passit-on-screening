<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PIO Tracker">
<title>Pass It On — Program Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F7F7F5;color:#1a1a18;min-height:100vh;}
:root{--navy:#0C447C;--navy-dark:#042C53;--navy-light:#E6F1FB;--gold:#BA7517;--gold-light:#FAEEDA;--gold-dark:#633806;--green:#3B6D11;--green-light:#EAF3DE;--border:rgba(0,0,0,0.12);--border-med:rgba(0,0,0,0.20);--white:#fff;--gray-50:#F7F7F5;--gray-100:#EEECE6;--text:#1a1a18;--text-muted:#5F5E5A;--text-hint:#888780;--radius:12px;--radius-sm:8px;}
.app-bar{background:var(--navy);color:white;padding:14px 16px 12px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;}
.app-bar-badge{background:rgba(255,255,255,0.18);font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;letter-spacing:0.06em;}
.app-bar-title{font-size:17px;font-weight:600;flex:1;}
.app-bar-count{font-size:12px;opacity:0.7;}
.nav-tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;position:sticky;top:53px;z-index:40;}
.nav-tab{flex:1;min-width:70px;padding:12px 8px;font-size:12px;font-weight:500;text-align:center;border:none;background:none;color:var(--text-muted);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;}
.nav-tab.active{color:var(--navy);border-bottom-color:var(--navy);}
.content{padding:16px;max-width:800px;margin:0 auto;}
.page{display:none;}
.page.active{display:block;}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.section-title{font-size:16px;font-weight:600;color:var(--text);}
.btn{padding:8px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border-med);background:var(--white);color:var(--text);-webkit-tap-highlight-color:transparent;}
.btn-primary{background:var(--navy);color:white;border-color:var(--navy);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-danger{color:#A32D2D;border-color:#F09595;background:#FCEBEB;}
.search-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--white);color:var(--text);-webkit-appearance:none;margin-bottom:14px;}
.client-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--navy-light);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--navy);flex-shrink:0;}
.client-name{font-size:14px;font-weight:600;color:var(--text);}
.client-meta{font-size:12px;color:var(--text-muted);margin-top:2px;}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;}
.badge-active{background:var(--green-light);color:var(--green);}
.badge-new{background:var(--navy-light);color:var(--navy);}
.badge-inactive{background:var(--gray-100);color:var(--text-muted);}
.badge-graduated{background:var(--gold-light);color:var(--gold-dark);}
.metric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.metric-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
.metric-label{font-size:11px;color:var(--text-muted);font-weight:500;margin-bottom:4px;}
.metric-value{font-size:26px;font-weight:700;color:var(--text);}
.metric-sub{font-size:11px;color:var(--text-hint);margin-top:2px;}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
.card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px;}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:420px;}
th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;color:var(--text-muted);border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.svc-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;}
.svc-nav{background:var(--navy-light);color:var(--navy);}
.svc-dropin{background:var(--gold-light);color:var(--gold-dark);}
.svc-edu{background:var(--green-light);color:var(--green);}
.svc-ref{background:#FBEAF0;color:#993556;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.bar-label{font-size:12px;color:var(--text-muted);min-width:100px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;background:var(--gray-100);border-radius:3px;height:8px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width 0.4s ease;}
.empty-state{text-align:center;padding:40px 16px;color:var(--text-muted);font-size:14px;}
/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
@media(min-width:600px){.modal-overlay{align-items:center;}}
.modal{background:var(--white);border-radius:16px 16px 0 0;padding:20px 16px;width:100%;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
@media(min-width:600px){.modal{border-radius:var(--radius);max-width:540px;max-height:85vh;}}
.modal-handle{width:40px;height:4px;background:var(--border-med);border-radius:2px;margin:0 auto 16px;}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.modal-title{font-size:17px;font-weight:600;color:var(--text);}
.modal-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
.close-btn{background:var(--gray-100);border:none;width:28px;height:28px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);flex-shrink:0;}
.form-group{margin-bottom:14px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
label{display:block;font-size:12px;font-weight:500;color:var(--text-muted);margin-bottom:5px;}
input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border-med);border-radius:var(--radius-sm);font-size:14px;color:var(--text);background:var(--white);-webkit-appearance:none;font-family:inherit;}
textarea{min-height:80px;resize:vertical;}
.tab-row{display:flex;gap:6px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0;}
.dtab{padding:8px 14px;font-size:13px;font-weight:500;border:none;background:none;color:var(--text-muted);border-bottom:2px solid transparent;cursor:pointer;margin-bottom:-1px;}
.dtab.active{color:var(--navy);border-bottom-color:var(--navy);}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px;}
.detail-row:last-child{border-bottom:none;}
.detail-key{color:var(--text-muted);flex-shrink:0;}
.detail-val{color:var(--text);font-weight:500;text-align:right;}
.section-lbl{font-size:11px;font-weight:600;color:var(--text-hint);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;margin-top:4px;}
.alert-err{background:#FCEBEB;color:#A32D2D;border:1px solid #F09595;padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px;}
.btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;}
.btn-row-spread{display:flex;gap:10px;justify-content:space-between;margin-top:16px;}
</style>
</head>
<body>

<div class="app-bar">
  <span class="app-bar-badge">PASS IT ON</span>
  <span class="app-bar-title">Program Tracker</span>
  <span class="app-bar-count" id="hdr-count"></span>
</div>

<div class="nav-tabs">
  <button class="nav-tab active" onclick="showPage('clients',this)">Clients</button>
  <button class="nav-tab" onclick="showPage('services',this)">Services</button>
  <button class="nav-tab" onclick="showPage('attendance',this)">Drop-In</button>
  <button class="nav-tab" onclick="showPage('reports',this)">Reports</button>
</div>

<div class="content">

  <!-- CLIENTS -->
  <div id="page-clients" class="page active">
    <div class="section-header">
      <span class="section-title">Client Database</span>
      <button class="btn btn-primary btn-sm" onclick="openAddClient()">+ Add Client</button>
    </div>
    <input class="search-input" type="search" id="client-search" placeholder="Search name, ID, referral source…" oninput="renderClients()">
    <div id="client-list"></div>
  </div>

  <!-- SERVICES -->
  <div id="page-services" class="page">
    <div class="section-header">
      <span class="section-title">Service Connections</span>
      <button class="btn btn-primary btn-sm" onclick="openAddService(null)">+ Log Service</button>
    </div>
    <div id="service-list"></div>
  </div>

  <!-- ATTENDANCE -->
  <div id="page-attendance" class="page">
    <div class="section-header">
      <span class="section-title">Drop-In Log</span>
      <button class="btn btn-primary btn-sm" onclick="openAddAttendance()">+ Log Session</button>
    </div>
    <div id="attendance-list"></div>
  </div>

  <!-- REPORTS -->
  <div id="page-reports" class="page">
    <div class="section-header">
      <span class="section-title">Program Reports</span>
      <button class="btn btn-sm" onclick="exportCSV()">Export CSV</button>
    </div>
    <div id="reports-content"></div>
  </div>

</div>

<div id="modal-root"></div>

<script>
const STORE_KEY = 'pio_tracker_v1';
let db = { clients:[], services:[], attendance:[] };

function save(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(db)); }catch(e){}
}
function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) db = JSON.parse(raw);
  }catch(e){}
  renderClients();
  updateHdrCount();
}

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function initials(n){ return (n||'').split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||'?'; }
function fmtDate(d){ if(!d) return '—'; const dt=new Date(d+'T12:00:00'); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function today(){ return new Date().toISOString().slice(0,10); }

const REFERRAL_SOURCES=['Self-Referral','Church of Genesis','Oil Region Recovery','LCDAC','Hospital / ER','Court / Legal','Family','Another Agency','Word of Mouth','Other'];
const SERVICE_TYPES=['Peer Navigation','Warm Handoff','Resource Connection','Drop-In Visit','Monday Night Meeting','Community Education','Follow-Up Contact','Crisis Support'];
const SUBSTANCE_CONCERNS=['Opioids','Alcohol','Stimulants','Cannabis','Benzodiazepines','Poly-Substance','Not Specified','N/A'];
const EVENT_TYPES=['Monday Night Meeting','Drop-In Center Open Hours','Community Education Event','Special Event / Outreach','The Pantry','The Link'];
const STATUSES=['Active','New','Inactive','Graduated'];

function updateHdrCount(){
  document.getElementById('hdr-count').textContent = db.clients.length+' clients';
}

function showPage(p, btn){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  if(btn) btn.classList.add('active');
  if(p==='services') renderServices();
  if(p==='attendance') renderAttendance();
  if(p==='reports') renderReports();
}

// ---- CLIENTS ----
function renderClients(){
  updateHdrCount();
  const q=(document.getElementById('client-search')||{value:''}).value.toLowerCase();
  const list=[...db.clients].filter(c=>
    (c.firstName+' '+c.lastName).toLowerCase().includes(q)||
    (c.id||'').toLowerCase().includes(q)||
    (c.referralSource||'').toLowerCase().includes(q)
  ).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const el=document.getElementById('client-list');
  if(!list.length){el.innerHTML='<div class="empty-state">No clients yet.<br>Tap "+ Add Client" to get started.</div>';return;}
  el.innerHTML=list.map(c=>{
    const sc=db.services.filter(s=>s.clientId===c.id).length;
    const lsvc=db.services.filter(s=>s.clientId===c.id).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
    return`<div class="client-card" onclick="openClientDetail('${c.id}')">
      <div class="avatar">${initials(c.firstName+' '+c.lastName)}</div>
      <div style="flex:1;min-width:0;">
        <div class="client-name">${c.firstName} ${c.lastName}</div>
        <div class="client-meta">${c.referralSource||'Unknown referral'} &bull; ${sc} service${sc!==1?'s':''}${lsvc?' &bull; '+fmtDate(lsvc.date):''}</div>
      </div>
      <span class="badge badge-${(c.status||'active').toLowerCase()}">${c.status||'Active'}</span>
    </div>`;
  }).join('');
}

function openAddClient(){
  showModal(`
    <div class="modal-handle"></div>
    <div class="modal-header"><div><div class="modal-title">Add New Client</div></div><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div id="m-alert"></div>
    <div class="form-grid">
      <div class="form-group"><label>First Name *</label><input id="f-fn" placeholder="First"></div>
      <div class="form-group"><label>Last Name *</label><input id="f-ln" placeholder="Last"></div>
      <div class="form-group"><label>Date of Birth</label><input id="f-dob" type="date"></div>
      <div class="form-group"><label>Intake Date *</label><input id="f-intake" type="date" value="${today()}"></div>
      <div class="form-group"><label>Phone</label><input id="f-phone" type="tel" placeholder="(814) 555-0000"></div>
      <div class="form-group"><label>City / Zip</label><input id="f-city" placeholder="New Castle, PA"></div>
    </div>
    <div class="form-group"><label>Referral Source</label><select id="f-ref">${REFERRAL_SOURCES.map(r=>`<option>${r}</option>`).join('')}</select></div>
    <div class="form-grid">
      <div class="form-group"><label>Status</label><select id="f-status">${STATUSES.map(s=>`<option>${s}</option>`).join('')}</select></div>
      <div class="form-group"><label>Substance Concern</label><select id="f-sub">${SUBSTANCE_CONCERNS.map(s=>`<option>${s}</option>`).join('')}</select></div>
    </div>
    <div class="form-group"><label>Notes / Presenting Needs</label><textarea id="f-notes" placeholder="Brief description of goals, needs, or background…"></textarea></div>
    <div class="btn-row">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveClient()">Save Client</button>
    </div>
  `);
}

function saveClient(){
  const fn=v('f-fn'),ln=v('f-ln'),intake=v('f-intake');
  if(!fn||!ln||!intake){document.getElementById('m-alert').innerHTML='<div class="alert-err">Please fill in First Name, Last Name, and Intake Date.</div>';return;}
  db.clients.push({id:uid(),firstName:fn,lastName:ln,dob:v('f-dob'),phone:v('f-phone'),city:v('f-city'),referralSource:v('f-ref'),intakeDate:intake,status:v('f-status'),substanceConcern:v('f-sub'),notes:v('f-notes'),createdAt:new Date().toISOString()});
  save();closeModal();renderClients();
}

function openClientDetail(id){
  const c=db.clients.find(x=>x.id===id);if(!c)return;
  const svcs=db.services.filter(s=>s.clientId===id).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const svcRows=svcs.length?svcs.map(s=>{
    const cls=svcClass(s.type);
    return`<div class="detail-row"><span class="detail-key">${fmtDate(s.date)}</span><span><span class="svc-tag ${cls}">${s.type}</span></span></div>`;
  }).join(''):'<div style="font-size:13px;color:var(--text-muted);padding:8px 0;">No services logged yet.</div>';

  showModal(`
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="avatar">${initials(c.firstName+' '+c.lastName)}</div>
        <div><div class="modal-title">${c.firstName} ${c.lastName}</div><div class="modal-sub">Intake: ${fmtDate(c.intakeDate)}</div></div>
      </div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="tab-row">
      <button class="dtab active" onclick="switchTab(this,'dt-profile')">Profile</button>
      <button class="dtab" onclick="switchTab(this,'dt-services')">Services (${svcs.length})</button>
      <button class="dtab" onclick="switchTab(this,'dt-edit')">Edit</button>
    </div>
    <div id="dt-profile">
      <div class="section-lbl">Contact</div>
      <div class="detail-row"><span class="detail-key">Phone</span><span class="detail-val">${c.phone||'—'}</span></div>
      <div class="detail-row"><span class="detail-key">City</span><span class="detail-val">${c.city||'—'}</span></div>
      <div class="detail-row"><span class="detail-key">Date of Birth</span><span class="detail-val">${fmtDate(c.dob)}</span></div>
      <div class="section-lbl" style="margin-top:14px;">Program</div>
      <div class="detail-row"><span class="detail-key">Status</span><span class="detail-val"><span class="badge badge-${(c.status||'active').toLowerCase()}">${c.status}</span></span></div>
      <div class="detail-row"><span class="detail-key">Referral Source</span><span class="detail-val">${c.referralSource||'—'}</span></div>
      <div class="detail-row"><span class="detail-key">Substance Concern</span><span class="detail-val">${c.substanceConcern||'—'}</span></div>
      ${c.notes?`<div class="section-lbl" style="margin-top:14px;">Notes</div><div style="font-size:13px;color:var(--text);line-height:1.6;">${c.notes}</div>`:''}
    </div>
    <div id="dt-services" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div class="section-lbl" style="margin:0;">Service History</div>
        <button class="btn btn-primary btn-sm" onclick="closeModal();openAddService('${id}')">+ Add</button>
      </div>
      ${svcRows}
    </div>
    <div id="dt-edit" style="display:none;">
      <div class="form-grid">
        <div class="form-group"><label>First Name</label><input id="e-fn" value="${c.firstName}"></div>
        <div class="form-group"><label>Last Name</label><input id="e-ln" value="${c.lastName}"></div>
        <div class="form-group"><label>Phone</label><input id="e-phone" value="${c.phone||''}"></div>
        <div class="form-group"><label>Status</label><select id="e-status">${STATUSES.map(s=>`<option${s===c.status?' selected':''}>${s}</option>`).join('')}</select></div>
      </div>
      <div class="form-group"><label>Notes</label><textarea id="e-notes">${c.notes||''}</textarea></div>
      <div class="btn-row-spread">
        <button class="btn btn-danger btn-sm" onclick="deleteClient('${id}')">Delete</button>
        <button class="btn btn-primary" onclick="updateClient('${id}')">Save Changes</button>
      </div>
    </div>
  `);
}

function switchTab(btn,tabId){
  btn.closest('.modal').querySelectorAll('.dtab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  ['dt-profile','dt-services','dt-edit'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
  const t=document.getElementById(tabId);if(t)t.style.display='block';
}

function updateClient(id){
  const c=db.clients.find(x=>x.id===id);if(!c)return;
  c.firstName=v('e-fn');c.lastName=v('e-ln');c.phone=v('e-phone');c.status=v('e-status');c.notes=v('e-notes');
  save();closeModal();renderClients();
}
function deleteClient(id){
  if(!confirm('Delete this client and all their service records?'))return;
  db.clients=db.clients.filter(c=>c.id!==id);
  db.services=db.services.filter(s=>s.clientId!==id);
  save();closeModal();renderClients();
}

// ---- SERVICES ----
function svcClass(t){
  if(!t)return'svc-ref';
  if(t.includes('Navigation')||t.includes('Peer'))return'svc-nav';
  if(t.includes('Drop')||t.includes('Monday'))return'svc-dropin';
  if(t.includes('Edu'))return'svc-edu';
  return'svc-ref';
}

function renderServices(){
  const svcs=[...db.services].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,80);
  const el=document.getElementById('service-list');
  if(!svcs.length){el.innerHTML='<div class="empty-state">No services logged yet.<br>Add a client first, then log services.</div>';return;}
  const rows=svcs.map(s=>{
    const c=db.clients.find(x=>x.id===s.clientId);
    return`<tr><td>${fmtDate(s.date)}</td><td>${c?c.firstName+' '+c.lastName:'Unknown'}</td><td><span class="svc-tag ${svcClass(s.type)}">${s.type}</span></td><td>${s.agency||'—'}</td><td><span class="badge ${s.warmHandoff==='Yes'?'badge-active':'badge-inactive'}">${s.warmHandoff||'No'}</span></td></tr>`;
  }).join('');
  el.innerHTML=`<div class="card" style="padding:0;overflow:hidden;"><div class="table-wrap"><table><thead><tr><th>Date</th><th>Client</th><th>Service</th><th>Agency</th><th>Handoff</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

function openAddService(preClientId){
  const opts=db.clients.map(c=>`<option value="${c.id}"${c.id===preClientId?' selected':''}>${c.firstName} ${c.lastName}</option>`).join('');
  showModal(`
    <div class="modal-handle"></div>
    <div class="modal-header"><div class="modal-title">Log Service</div><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div id="m-alert"></div>
    <div class="form-group"><label>Client *</label><select id="s-client"><option value="">— Select Client —</option>${opts}</select></div>
    <div class="form-grid">
      <div class="form-group"><label>Service Type *</label><select id="s-type">${SERVICE_TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div>
      <div class="form-group"><label>Date *</label><input id="s-date" type="date" value="${today()}"></div>
    </div>
    <div class="form-group"><label>Agency / Resource Connected To</label><input id="s-agency" placeholder="e.g. LCDAC, Cove Forge, AA Group…"></div>
    <div class="form-grid">
      <div class="form-group"><label>Warm Handoff?</label><select id="s-handoff"><option>No</option><option>Yes</option><option>Pending</option></select></div>
      <div class="form-group"><label>Follow-Up?</label><select id="s-fu"><option>No</option><option>Yes – 1 week</option><option>Yes – 2 weeks</option><option>Yes – 30 days</option></select></div>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="s-notes" placeholder="Brief description of service, next steps…"></textarea></div>
    <div class="btn-row">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveService()">Save</button>
    </div>
  `);
}

function saveService(){
  const cid=v('s-client'),date=v('s-date');
  if(!cid||!date){document.getElementById('m-alert').innerHTML='<div class="alert-err">Please select a client and date.</div>';return;}
  db.services.push({id:uid(),clientId:cid,type:v('s-type'),date,agency:v('s-agency'),warmHandoff:v('s-handoff'),followUp:v('s-fu'),notes:v('s-notes'),createdAt:new Date().toISOString()});
  save();closeModal();renderServices();
}

// ---- ATTENDANCE ----
function renderAttendance(){
  const sessions=[...db.attendance].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const el=document.getElementById('attendance-list');
  if(!sessions.length){el.innerHTML='<div class="empty-state">No sessions logged yet.<br>Tap "+ Log Session" to record attendance.</div>';return;}
  const rows=sessions.map(s=>`<tr><td>${fmtDate(s.date)}</td><td>${s.type}</td><td style="font-weight:600">${s.count}</td><td>${s.newVisitors||0}</td><td>${s.facilitator||'—'}</td></tr>`).join('');
  el.innerHTML=`<div class="card" style="padding:0;overflow:hidden;"><div class="table-wrap"><table><thead><tr><th>Date</th><th>Event</th><th>Total</th><th>New</th><th>Facilitator</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

function openAddAttendance(){
  showModal(`
    <div class="modal-handle"></div>
    <div class="modal-header"><div class="modal-title">Log Drop-In Session</div><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="form-grid">
      <div class="form-group"><label>Event Type *</label><select id="a-type">${EVENT_TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div>
      <div class="form-group"><label>Date *</label><input id="a-date" type="date" value="${today()}"></div>
      <div class="form-group"><label>Total Attendees *</label><input id="a-count" type="number" min="0" placeholder="0"></div>
      <div class="form-group"><label>New Visitors</label><input id="a-new" type="number" min="0" placeholder="0"></div>
      <div class="form-group" style="grid-column:1/-1"><label>Facilitator</label><input id="a-fac" placeholder="Name of facilitator / volunteer"></div>
    </div>
    <div class="form-group"><label>Session Notes / Topic</label><textarea id="a-notes" placeholder="Meeting topic, discussion focus, notable moments…"></textarea></div>
    <div class="btn-row">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveAttendance()">Save</button>
    </div>
  `);
}

function saveAttendance(){
  const date=v('a-date');if(!date)return;
  db.attendance.push({id:uid(),type:v('a-type'),date,count:parseInt(v('a-count'))||0,newVisitors:parseInt(v('a-new'))||0,facilitator:v('a-fac'),notes:v('a-notes'),createdAt:new Date().toISOString()});
  save();closeModal();renderAttendance();
}

// ---- REPORTS ----
function renderReports(){
  const el=document.getElementById('reports-content');
  const now=new Date();
  const mo=now.getMonth(),yr=now.getFullYear();
  const moSess=db.attendance.filter(a=>{const d=new Date(a.date);return d.getMonth()===mo&&d.getFullYear()===yr;});
  const totalAtt=db.attendance.reduce((s,a)=>s+a.count,0);
  const moAtt=moSess.reduce((s,a)=>s+a.count,0);
  const newVis=db.attendance.reduce((s,a)=>s+(a.newVisitors||0),0);
  const activeC=db.clients.filter(c=>c.status==='Active').length;
  const handoffs=db.services.filter(s=>s.warmHandoff==='Yes').length;

  const refC={};db.clients.forEach(c=>{const r=c.referralSource||'Unknown';refC[r]=(refC[r]||0)+1;});
  const topRef=Object.entries(refC).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxRef=topRef.length?topRef[0][1]:1;

  const svcC={};db.services.forEach(s=>{svcC[s.type]=(svcC[s.type]||0)+1;});
  const topSvc=Object.entries(svcC).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxSvc=topSvc.length?topSvc[0][1]:1;

  const evtC={};db.attendance.forEach(a=>{evtC[a.type]=(evtC[a.type]||0)+a.count;});
  const topEvt=Object.entries(evtC).sort((a,b)=>b[1]-a[1]);
  const maxEvt=topEvt.length?topEvt[0][1]:1;

  el.innerHTML=`
    <div class="metric-grid">
      <div class="metric-card"><div class="metric-label">Total Clients</div><div class="metric-value">${db.clients.length}</div><div class="metric-sub">Unduplicated</div></div>
      <div class="metric-card"><div class="metric-label">Active Clients</div><div class="metric-value">${activeC}</div><div class="metric-sub">Current status</div></div>
      <div class="metric-card"><div class="metric-label">Services Logged</div><div class="metric-value">${db.services.length}</div><div class="metric-sub">Total contacts</div></div>
      <div class="metric-card"><div class="metric-label">Warm Handoffs</div><div class="metric-value">${handoffs}</div><div class="metric-sub">Completed</div></div>
      <div class="metric-card"><div class="metric-label">Drop-In Total</div><div class="metric-value">${totalAtt}</div><div class="metric-sub">All time</div></div>
      <div class="metric-card"><div class="metric-label">This Month</div><div class="metric-value">${moAtt}</div><div class="metric-sub">${moSess.length} session${moSess.length!==1?'s':''}</div></div>
      <div class="metric-card"><div class="metric-label">New Visitors</div><div class="metric-value">${newVis}</div><div class="metric-sub">First-timers</div></div>
      <div class="metric-card"><div class="metric-label">Sessions Logged</div><div class="metric-value">${db.attendance.length}</div><div class="metric-sub">Events total</div></div>
    </div>
    <div class="card"><div class="card-title">Referral Sources</div>
      ${topRef.length?topRef.map(([r,n])=>`<div class="bar-row"><div class="bar-label">${r}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxRef*100)}%;background:var(--navy);"></div></div><span style="font-size:12px;font-weight:600;color:var(--text);min-width:20px;">${n}</span></div>`).join(''):'<div style="font-size:13px;color:var(--text-muted);">No data yet</div>'}
    </div>
    <div class="card"><div class="card-title">Service Types</div>
      ${topSvc.length?topSvc.map(([t,n])=>`<div class="bar-row"><div class="bar-label">${t}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxSvc*100)}%;background:var(--gold);"></div></div><span style="font-size:12px;font-weight:600;color:var(--text);min-width:20px;">${n}</span></div>`).join(''):'<div style="font-size:13px;color:var(--text-muted);">No data yet</div>'}
    </div>
    <div class="card"><div class="card-title">Attendance by Event</div>
      ${topEvt.length?topEvt.map(([t,n])=>`<div class="bar-row"><div class="bar-label">${t}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxEvt*100)}%;background:#1D9E75;"></div></div><span style="font-size:12px;font-weight:600;color:var(--text);min-width:28px;">${n}</span></div>`).join(''):'<div style="font-size:13px;color:var(--text-muted);">No data yet</div>'}
    </div>
    <div style="font-size:12px;color:var(--text-hint);margin-top:4px;padding-bottom:20px;">All metrics based on data entered in this tracker. Unduplicated client count = unique records.</div>
  `;
}

function exportCSV(){
  const lines=['Pass It On Program Report – '+new Date().toLocaleDateString(),'','--- CLIENTS ---','ID,First Name,Last Name,Status,Intake Date,Referral Source,Substance Concern'];
  db.clients.forEach(c=>lines.push([c.id,c.firstName,c.lastName,c.status,c.intakeDate,c.referralSource,c.substanceConcern].join(',')));
  lines.push('','--- SERVICES ---','Date,Client,Service Type,Agency,Warm Handoff,Follow-Up');
  db.services.forEach(s=>{const c=db.clients.find(x=>x.id===s.clientId);lines.push([s.date,(c?c.firstName+' '+c.lastName:'Unknown'),s.type,s.agency,s.warmHandoff,s.followUp].join(','));});
  lines.push('','--- ATTENDANCE ---','Date,Event Type,Total Attendees,New Visitors,Facilitator');
  db.attendance.forEach(a=>lines.push([a.date,a.type,a.count,a.newVisitors,a.facilitator].join(',')));
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='PassItOn_Report_'+today()+'.csv';a.click();
}

// ---- MODAL UTILS ----
function showModal(html){
  document.getElementById('modal-root').innerHTML=`<div class="modal-overlay" id="modal-overlay" onclick="overlayClose(event)"><div class="modal">${html}</div></div>`;
}
function closeModal(){ document.getElementById('modal-root').innerHTML=''; }
function overlayClose(e){ if(e.target.id==='modal-overlay') closeModal(); }

function v(id){ const el=document.getElementById(id); return el?el.value.trim():''; }

load();
</script>
</body>
</html>
